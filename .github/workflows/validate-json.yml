name: "Validate JSON"
on:
  pull_request:
    paths:
      - "**.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: "**.json"

      - name: Validate JSON files
        if: steps.changed.outputs.any_changed == 'true'
        id: validate
        run: |
          chmod +x .github/scripts/validate-json.sh
          ./.github/scripts/validate-json.sh
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}

      - name: Comment on PR
        if: steps.validate.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/comment-json-errors.js');
            await script({ github, context });
        env:
          REPORT: ${{ steps.validate.outputs.report }}

      - name: Fail if invalid
        if: steps.validate.outputs.failed == 'true'
        run: exit 1
