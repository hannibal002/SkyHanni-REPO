name: "Validate JSON"
on:
  pull_request:
    paths:
      - "**.json"

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@48d8f15b2aaa3d255ca5af3eba4870f807ce6b3c  # v45.0.2
        with:
          files: "**.json"
          separator: "\n"

      - name: Validate JSON files
        if: steps.changed.outputs.any_changed == 'true'
        id: validate
        run: |
          chmod +x .github/scripts/validate-json.sh
          ./.github/scripts/validate-json.sh
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}

      - name: Save validation report
        if: steps.validate.outputs.failed == 'true'
        env:
          REPORT: ${{ steps.validate.outputs.report }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          printf '%s' "$REPORT" > validation-report.txt
          printf '%s' "$PR_NUMBER" > pr-number.txt

      - name: Upload validation artifact
        if: steps.validate.outputs.failed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: validation-report
          path: |
            validation-report.txt
            pr-number.txt
          retention-days: 1

      - name: Fail if invalid
        if: steps.validate.outputs.failed == 'true'
        run: exit 1
